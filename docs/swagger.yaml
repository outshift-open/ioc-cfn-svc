basePath: /
definitions:
  audit.Audit:
    properties:
      audit_extra_information:
        type: string
      audit_information:
        items:
          type: integer
        type: array
      audit_resource_identifier:
        type: string
      audit_type:
        type: string
      created_by:
        type: string
      created_on:
        type: string
      id:
        type: string
      last_modified_by:
        type: string
      last_modified_on:
        type: string
      operation_id:
        type: string
      resource_identifier:
        type: string
      resource_type:
        type: string
    type: object
  audit.CreateAuditEventRequest:
    properties:
      audit_extra_information:
        type: string
      audit_information:
        items:
          type: integer
        type: array
      audit_resource_identifier:
        type: string
      audit_type:
        type: string
      created_by:
        type: string
      last_modified_by:
        type: string
      operation_id:
        type: string
      resource_identifier:
        type: string
      resource_type:
        type: string
    type: object
  cognitionagentclient.ExtractionPayload:
    properties:
      data:
        description: |-
          Data contains the extraction payload and its structure depends on Metadata.Format.

          Supported formats: "observe-sdk-otel" and "openclaw

          1. format = "observe-sdk-otel"
             - Data MUST be a JSON array of ExtractionDataRecord objects.
             - Example:
          [
            { TraceId, SpanId, ParentSpanId, SpanName, ServiceName, SpanAttributes, Duration }
          ]

          2. format = "openclaw"
             - Data is an opaque JSON payload.
             - The structure is not interpreted or validated by this service and is processed as-is.

          Clients MUST ensure the Data field matches the structure required by the specified Metadata.Format.
        type: object
      metadata:
        allOf:
        - $ref: '#/definitions/cognitionagentclient.ExtractionPayloadMetadata'
        description: Metadata describes the format and interpretation of the payload.
    type: object
  cognitionagentclient.ExtractionPayloadMetadata:
    properties:
      format:
        description: |-
          Format specifies how the Data field should be interpreted.

          Supported values:
          - "observe-sdk-otel": Data is a JSON array of ExtractionDataRecord
          - "openclaw": Data is an opaque JSON payload
        type: string
    type: object
  cognitionagents.ConceptsSearchRequest:
    properties:
      header:
        $ref: '#/definitions/common.Header'
    type: object
  cognitionagents.ConceptsSearchResponse:
    properties:
      error:
        $ref: '#/definitions/common.ErrorDetail'
      header:
        $ref: '#/definitions/common.Header'
      response_id:
        type: string
      results:
        items:
          additionalProperties: true
          type: object
        type: array
    type: object
  cognitionagents.MemoryCreateRequest:
    properties:
      header:
        $ref: '#/definitions/common.Header'
    type: object
  cognitionagents.MemoryCreateResponse:
    properties:
      error:
        $ref: '#/definitions/common.ErrorDetail'
      header:
        $ref: '#/definitions/common.Header'
      response_id:
        type: string
    type: object
  cognitionagents.MemorySearchRequest:
    properties:
      embeding:
        description: Kept as "embeding" per API spec
        items:
          type: number
        type: array
      header:
        $ref: '#/definitions/common.Header'
      k:
        type: integer
      queries:
        items:
          type: string
        type: array
    type: object
  cognitionagents.MemorySearchResponse:
    properties:
      error:
        $ref: '#/definitions/common.ErrorDetail'
      header:
        $ref: '#/definitions/common.Header'
      response_id:
        type: string
      results:
        items:
          $ref: '#/definitions/cognitionagents.QueryResult'
        type: array
    type: object
  cognitionagents.PathEdge:
    properties:
      from_id:
        type: string
      from_name:
        type: string
      relation:
        type: string
      to_id:
        type: string
      to_name:
        type: string
    type: object
  cognitionagents.PathResult:
    properties:
      edges:
        items:
          $ref: '#/definitions/cognitionagents.PathEdge'
        type: array
      node_ids:
        items:
          type: string
        type: array
      path_length:
        type: integer
      symbolic:
        type: string
    type: object
  cognitionagents.PathsSearchPayload:
    properties:
      from_id:
        type: string
      max_depth:
        type: integer
      relations:
        items:
          type: string
        type: array
      to_id:
        type: string
    type: object
  cognitionagents.PathsSearchRequest:
    properties:
      header:
        $ref: '#/definitions/common.Header'
      payload:
        $ref: '#/definitions/cognitionagents.PathsSearchPayload'
    type: object
  cognitionagents.PathsSearchResponse:
    properties:
      error:
        $ref: '#/definitions/common.ErrorDetail'
      header:
        $ref: '#/definitions/common.Header'
      paths:
        items:
          $ref: '#/definitions/cognitionagents.PathResult'
        type: array
      response_id:
        type: string
    type: object
  cognitionagents.QueryResult:
    properties:
      hits:
        items:
          additionalProperties: true
          type: object
        type: array
      query:
        type: string
    type: object
  common.ErrorDetail:
    properties:
      detail:
        additionalProperties: true
        type: object
      message:
        type: string
    type: object
  common.Header:
    properties:
      agent_id:
        description: Optional
        type: string
      mas_id:
        description: Mandatory
        type: string
      workspace_id:
        description: Mandatory
        type: string
    type: object
  iocmemoryprovider.Concept:
    properties:
      attributes:
        additionalProperties: true
        type: object
      description:
        type: string
      embeddings:
        $ref: '#/definitions/iocmemoryprovider.EmbeddingConfig'
      id:
        type: string
      name:
        type: string
      tags:
        items:
          type: string
        type: array
    type: object
  iocmemoryprovider.EmbeddingConfig:
    properties:
      data:
        items:
          type: number
        type: array
      name:
        type: string
    type: object
  iocmemoryprovider.KnowledgeGraphQueryResponseRecord:
    properties:
      concepts:
        items:
          $ref: '#/definitions/iocmemoryprovider.Concept'
        type: array
      relationships:
        items:
          $ref: '#/definitions/iocmemoryprovider.Relation'
        type: array
    type: object
  iocmemoryprovider.Relation:
    properties:
      attributes:
        additionalProperties: true
        type: object
      embeddings:
        $ref: '#/definitions/iocmemoryprovider.EmbeddingConfig'
      id:
        type: string
      node_ids:
        items:
          type: string
        type: array
      relation:
        type: string
    type: object
  memoryoperations.MemoryOperationHeader:
    type: object
  memoryoperations.MemoryOperationPayload:
    properties:
      http-headers:
        additionalProperties:
          type: string
        description: Custom headers
        type: object
      http-request-body:
        additionalProperties: true
        description: JSON payload
        type: object
      http-request-type:
        description: POST, PUT, GET, DELETE, etc.
        type: string
      http-url:
        description: URL with query parameters (URL encoded)
        type: string
    type: object
  memoryoperations.MemoryOperationRequest:
    properties:
      header:
        $ref: '#/definitions/memoryoperations.MemoryOperationHeader'
      payload:
        $ref: '#/definitions/memoryoperations.MemoryOperationPayload'
    type: object
  memoryoperations.MemoryOperationResponse:
    properties:
      http-headers:
        additionalProperties:
          type: string
        type: object
      http-response-body:
        additionalProperties: true
        type: object
      http-status:
        type: integer
    type: object
  sharedmemory.QueryRequest:
    properties:
      additional_context:
        description: |-
          TODO: not sure if we allow users to specify query type along with specified node IDs
          NodeIDs           *[]string                                      `json:"node_ids,omitempty"`        // node ID(s) must be provided if query_type is "neighbor" or "path". Node ID(s) is ignored is query_type is set to be "concept"
          QueryCriteria     *iocmemoryprovider.KnowledgeGraphQueryCriteria `json:"query_criteria,omitempty"`
        items: {}
        type: array
      agent_id:
        type: string
      intent:
        type: string
      request_id:
        type: string
      search_strategy:
        description: 'only supported search strategy: "semantic_graph_traversal"'
        type: string
    type: object
  sharedmemory.QueryResponse:
    properties:
      message:
        type: string
      records:
        items:
          $ref: '#/definitions/iocmemoryprovider.KnowledgeGraphQueryResponseRecord'
        type: array
      response_id:
        type: string
      status:
        type: string
    type: object
  sharedmemory.UpsertRequest:
    properties:
      agent_id:
        description: optional
        type: string
      payload:
        $ref: '#/definitions/cognitionagentclient.ExtractionPayload'
      request_id:
        type: string
    type: object
  sharedmemory.UpsertResponse:
    properties:
      message:
        type: string
      response_id:
        type: string
      status:
        type: string
    type: object
info:
  contact: {}
  description: IoC Cognitive Fabric Node service — shared memory routing, memory operations
    proxy, and audit trail.
  title: CFN Service API
  version: "1.0"
paths:
  /api/cfn/{cfnId}/memory:
    post:
      consumes:
      - application/json
      description: Creates a new memory record for a cognition agent
      parameters:
      - description: CFN ID
        in: path
        name: cfnId
        required: true
        type: string
      - description: Memory create request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/cognitionagents.MemoryCreateRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/cognitionagents.MemoryCreateResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/cognitionagents.MemoryCreateResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/cognitionagents.MemoryCreateResponse'
      summary: Create cognition agent memory
      tags:
      - cognition-agents
  /api/cfn/{cfnId}/memory/concepts/search:
    post:
      consumes:
      - application/json
      description: Searches memory concepts for a cognition agent
      parameters:
      - description: CFN ID
        in: path
        name: cfnId
        required: true
        type: string
      - description: Concepts search request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/cognitionagents.ConceptsSearchRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/cognitionagents.ConceptsSearchResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/cognitionagents.ConceptsSearchResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/cognitionagents.ConceptsSearchResponse'
      summary: Search cognition agent memory concepts
      tags:
      - cognition-agents
  /api/cfn/{cfnId}/memory/paths/search:
    post:
      consumes:
      - application/json
      description: Searches for paths between two nodes in cognition agent memory
      parameters:
      - description: CFN ID
        in: path
        name: cfnId
        required: true
        type: string
      - description: Paths search request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/cognitionagents.PathsSearchRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/cognitionagents.PathsSearchResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/cognitionagents.PathsSearchResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/cognitionagents.PathsSearchResponse'
      summary: Search memory paths
      tags:
      - cognition-agents
  /api/cfn/{cfnId}/memory/search:
    post:
      consumes:
      - application/json
      description: Searches cognition agent memory with natural-language queries and
        embeddings
      parameters:
      - description: CFN ID
        in: path
        name: cfnId
        required: true
        type: string
      - description: Memory search request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/cognitionagents.MemorySearchRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/cognitionagents.MemorySearchResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/cognitionagents.MemorySearchResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/cognitionagents.MemorySearchResponse'
      summary: Search cognition agent memory
      tags:
      - cognition-agents
  /api/internal/audit-events:
    get:
      description: Returns audit events with optional resource_type and audit_type
        query filters
      parameters:
      - description: Filter by resource type
        in: query
        name: resource_type
        type: string
      - description: Filter by audit type
        in: query
        name: audit_type
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/audit.Audit'
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List audit events
      tags:
      - audit
    post:
      consumes:
      - application/json
      description: Creates a new audit event after validating required fields and
        enum values
      parameters:
      - description: Audit event request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/audit.CreateAuditEventRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create an audit event
      tags:
      - audit
  /api/internal/audit-events/{eventId}:
    delete:
      description: Deletes a single audit event by its UUID (internal API only)
      parameters:
      - description: Audit event UUID
        in: path
        name: eventId
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Delete an audit event
      tags:
      - audit
    get:
      description: Returns a single audit event by its UUID
      parameters:
      - description: Audit event UUID
        in: path
        name: eventId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/audit.Audit'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get an audit event by ID
      tags:
      - audit
  /api/workspaces/{workspaceId}/multi-agentic-systems/{masId}/agents/{agentId}/memory-operations:
    post:
      consumes:
      - application/json
      description: |-
        Forwards REST API requests to a remote memory provider (Mem0, Graphiti, etc.) for agent-specific memory operations.
        The memory provider base URL and auth credentials are auto-resolved from management plane config based on workspace/MAS/agent IDs.
        The `http-url` field should contain the relative path and query parameters to append to the provider base URL.

        **GET example** — retrieve memories:
        ```json
        {
        "header": {},
        "payload": {
        "http-request-type": "GET",
        "http-url": "v1/memories/?user_id=curl-test-user",
        "http-request-body": {},
        "http-headers": {}
        }
        }
        ```

        **POST example** — add memories:
        ```json
        {
        "header": {},
        "payload": {
        "http-request-type": "POST",
        "http-url": "/v1/memories/",
        "http-request-body": {
        "messages": [{"role": "user", "content": "I prefer dark mode in all my apps"}],
        "user_id": "curl-test-user"
        },
        "http-headers": {}
        }
        }
        ```
      parameters:
      - description: Workspace ID
        in: path
        name: workspaceId
        required: true
        type: string
      - description: Multi-Agentic System ID
        in: path
        name: masId
        required: true
        type: string
      - description: Agent ID
        in: path
        name: agentId
        required: true
        type: string
      - description: Memory operation request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/memoryoperations.MemoryOperationRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Proxied response (actual provider status is in http-status
            field)
          schema:
            $ref: '#/definitions/memoryoperations.MemoryOperationResponse'
        "400":
          description: Invalid request body or missing http-request-type
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Memory provider config not found for agent
          schema:
            additionalProperties:
              type: string
            type: object
        "502":
          description: Failed to forward request to memory provider
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: Memory proxy client not configured
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Proxy API requests to a remote memory provider
      tags:
      - memory-operations
  /api/workspaces/{workspaceId}/multi-agentic-systems/{masId}/shared-memories:
    post:
      consumes:
      - application/json
      description: Upserts shared memory with entries (concepts and relations) extracted
        from provided trace or openclaw output for a given workspace and multi-agentic
        system.
      parameters:
      - description: Workspace ID
        in: path
        name: workspaceId
        required: true
        type: string
      - description: Multi-Agentic System ID
        in: path
        name: masId
        required: true
        type: string
      - description: Upsert request
        in: body
        name: body
        schema:
          $ref: '#/definitions/sharedmemory.UpsertRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Shared memories successfully upserted
          schema:
            $ref: '#/definitions/sharedmemory.UpsertResponse'
        "400":
          description: Invalid request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Upsert shared memories.
      tags:
      - shared-memories
  /api/workspaces/{workspaceId}/multi-agentic-systems/{masId}/shared-memories/query:
    post:
      consumes:
      - application/json
      description: Queries shared memories for a given workspace and multi-agentic
        system using a graph path query.
      parameters:
      - description: Workspace ID
        in: path
        name: workspaceId
        required: true
        type: string
      - description: Multi-Agentic System ID
        in: path
        name: masId
        required: true
        type: string
      - description: Query request
        in: body
        name: body
        schema:
          $ref: '#/definitions/sharedmemory.QueryRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Query executed successfully
          schema:
            $ref: '#/definitions/sharedmemory.QueryResponse'
        "400":
          description: Invalid request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Fetch shared memories
      tags:
      - shared-memories
swagger: "2.0"
