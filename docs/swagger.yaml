  semanticalignment.AgentDecision:
    properties:
      action:
        description: Action is one of "accept", "reject", or "counter_offer".
        type: string
      offer:
        additionalProperties:
          type: string
        description: |-
          Offer is the proposed option per issue when Action is "counter_offer".
          Shape: {issue_id: option_label}
        type: object
      participant_id:
        description: ParticipantID is the ID of the participant who made this decision.
        type: string
    type: object
  semanticalignment.AgentReply:
    properties:
      action:
        description: Action is one of "accept", "reject", or "counter_offer".
        type: string
      offer:
        additionalProperties:
          type: string
        description: |-
          Offer is the proposed option per issue when Action is "counter_offer".
          Shape: {issue_id: option_label}
        type: object
      participant_id:
        description: ParticipantID is the ID of the agent replying.
        type: string
    type: object
  semanticalignment.DecideRequest:
    properties:
      agent_replies:
        description: AgentReplies contains each agent's reply to the current round.
        items:
          $ref: '#/definitions/semanticalignment.AgentReply'
        type: array
      session_id:
        description: SessionID is the session identifier from the /start response.
        type: string
    type: object
  semanticalignment.DecideResponse:
    properties:
      final_result:
        additionalProperties: true
        description: |-
          FinalResult holds the terminal negotiation envelope when Status is
          "agreed", "broken", or "timeout".
        type: object
      messages:
        description: |-
          Messages contains the next round's messages to dispatch to agents.
          Present only when Status is "ongoing". Forward these to each agent's
          callback endpoint, collect their replies, and submit via /decide again.
        items:
          items:
            type: integer
          type: array
        type: array
      meta:
        allOf:
        - $ref: '#/definitions/common.TokenUsageMeta'
        description: Meta contains LLM token usage metadata
      round:
        description: Round is the round number that was just evaluated.
        type: integer
      session_id:
        description: SessionID echoes the session identifier.
        type: string
      shared_memory:
        allOf:
        - $ref: '#/definitions/semanticalignment.SharedMemoryResult'
        description: |-
          SharedMemory reports the outcome of persisting the agreement to shared
          memory. Only present when Status is "agreed".
      status:
        description: Status is "ongoing", "agreed", "broken", or "timeout".
        type: string
    type: object
  semanticalignment.NegotiationOutcome:
    properties:
      chosen_option:
        type: string
      issue_id:
        type: string
    type: object
  semanticalignment.NegotiationTrace:
    properties:
      broken:
        description: Broken indicates whether a participant explicitly broke off.
        type: boolean
      final_agreement:
        description: FinalAgreement is the agreed option per issue, if any.
        items:
          $ref: '#/definitions/semanticalignment.NegotiationOutcome'
        type: array
      rounds:
        description: Rounds contains all SAO rounds in order (1-based).
        items:
          $ref: '#/definitions/semanticalignment.RoundOffer'
        type: array
      timedout:
        description: Timedout indicates whether the SAO exhausted its step budget.
        type: boolean
    type: object
  semanticalignment.RoundOffer:
    properties:
      decisions:
        description: Decisions contains each participant's response to this round's
          offer.
        items:
          $ref: '#/definitions/semanticalignment.AgentDecision'
        type: array
      next_proposer_id:
        description: |-
          NextProposerID is the ID of the participant who will propose in the next round.
          Omitted on the final round.
        type: string
      offer:
        additionalProperties:
          type: string
        description: 'Offer is the proposed option per issue. Shape: {issue_id: option_label}'
        type: object
      proposer_id:
        description: ProposerID is the ID of the participant who made this proposal.
        type: string
      round:
        description: Round is the 1-based round number.
        type: integer
    type: object
  semanticalignment.SharedMemoryResult:
    properties:
      error:
        description: Error contains a human-readable reason when Persisted is false.
        type: string
      persisted:
        description: Persisted is true when the agreement was successfully written
          to shared memory.
        type: boolean
    type: object
  semanticalignment.StartRequest:
    properties:
      agents:
        description: Agents is the list of participating agents (minimum 2).
        items:
          $ref: '#/definitions/semanticalignment.Agent'
        type: array
      content_text:
        description: ContentText is the negotiation prompt/context used to initialize
          the session.
        type: string
      n_steps:
        description: |-
          NSteps is the maximum number of SAO rounds.
          If omitted, the service computes a budget from negotiation complexity.
        type: integer
      session_id:
        description: SessionID is the client-provided session identifier.
        type: string
    type: object
  semanticalignment.StartResponse:
    properties:
      current_round:
        allOf:
        - $ref: '#/definitions/semanticalignment.RoundOffer'
        description: CurrentRound is the first offer in the trace (SSTP envelope path
          only).
      issues:
        description: Issues is the list of negotiable issues discovered from content_text.
        items:
          type: string
        type: array
      messages:
        description: |-
          Messages contains the first round's messages to dispatch to agents.
          Forward each message to the corresponding agent's callback endpoint,
          collect their replies, and submit via /decide.
        items:
          items:
            type: integer
          type: array
        type: array
      meta:
        allOf:
        - $ref: '#/definitions/common.TokenUsageMeta'
        description: Meta contains LLM token usage metadata
      n_steps:
        description: NSteps is the SAO round budget for this session.
        type: integer
      options_per_issue:
        additionalProperties:
          items:
            type: string
          type: array
        description: OptionsPerIssue lists the candidate options for each issue.
        type: object
      round:
        description: Round is the current round number (1-based).
        type: integer
      session_id:
        description: SessionID echoes the session identifier.
        type: string
      status:
        description: Status is "initiated", "ongoing", "agreed", "broken", or "timeout".
        type: string
      total_rounds:
        description: TotalRounds is the total SAO rounds in the pre-computed trace
          (SSTP envelope path only).
        type: integer
      trace:
        allOf:
        - $ref: '#/definitions/semanticalignment.NegotiationTrace'
        description: Trace is the complete pre-computed SAO trace (SSTP envelope path
          only).
    type: object
  sharedmemory.AgentVectorDeleteRequest:
    properties:
      filters:
        $ref: '#/definitions/sharedmemory.VectorDeleteMetadataFilter'
      id:
        type: string
      request_id:
        type: string
    type: object
  sharedmemory.AgentVectorUpsertRecord:
    properties:
      content:
        type: string
      embedding:
        $ref: '#/definitions/sharedmemory.VectorEmbeddingPayload'
      id:
        type: string
      metadata:
        additionalProperties: true
        type: object
    type: object
  sharedmemory.AgentVectorUpsertRequest:
    properties:
      records:
        items:
          $ref: '#/definitions/sharedmemory.AgentVectorUpsertRecord'
        type: array
      request_id:
        type: string
    type: object
  sharedmemory.ConceptsByIdsRequest:
    properties:
      ids:
        items:
          type: string
        type: array
    type: object
  sharedmemory.ConceptsByIdsResponse:
    properties:
      concepts:
        items:
          $ref: '#/definitions/sharedmemory.GraphConcept'
        type: array
    type: object
  sharedmemory.CreateOrUpdateAcceptedResponse:
    properties:
      message:
        description: Message provides additional information
        type: string
      response_id:
        description: ID of the request, can be used for correlation in logs
        type: string
      status:
        description: Status indicates the request was accepted for processing
        type: string
    type: object
  sharedmemory.CreateOrUpdateRequest:
    properties:
      header:
        allOf:
        - $ref: '#/definitions/sharedmemory.Header'
        description: Header(s) of the request, optional
      payload:
        allOf:
        - $ref: '#/definitions/cognitionagentclient.ExtractionPayload'
        description: Payload contains the extraction metadata and the raw data to
          be processed. The structure of the payload data is defined by Payload.Metadata.Format
      request_id:
        description: ID of the request, optional. If not provided, a random UUID is
          used to represent the request
        type: string
    type: object
  sharedmemory.GraphConcept:
    properties:
      description:
        type: string
      id:
        type: string
      name:
        type: string
      type:
        type: string
    type: object
  sharedmemory.GraphPathsRequest:
    properties:
      limit:
        type: integer
      max_depth:
        type: integer
      relations:
        items:
          type: string
        type: array
      source_id:
        type: string
      target_id:
        type: string
    type: object
  sharedmemory.GraphPathsResponse:
    properties:
      paths:
        items:
          $ref: '#/definitions/sharedmemory.Path'
        type: array
      status:
        type: string
    type: object
  sharedmemory.Header:
    properties:
      agent_id:
        description: ID that represents the agent, optional for query operations
        type: string
    type: object
  sharedmemory.NeighborsResponse:
    properties:
      records:
        items:
          $ref: '#/definitions/sharedmemory.QueryResponseRecord'
        type: array
    type: object
  sharedmemory.Path:
    properties:
      edges:
        items:
          $ref: '#/definitions/sharedmemory.PathEdge'
        type: array
      node_ids:
        items:
          type: string
        type: array
      path_length:
        type: integer
      symbolic:
        type: string
    type: object
  sharedmemory.PathEdge:
    properties:
      from_id:
        type: string
      from_name:
        type: string
      relation:
        type: string
      to_id:
        type: string
      to_name:
        type: string
    type: object
  sharedmemory.QueryConcept:
    properties:
      attributes:
        additionalProperties: true
        type: object
      description:
        type: string
      id:
        type: string
      name:
        type: string
      tags:
        items:
          type: string
        type: array
    type: object
  sharedmemory.QueryRelation:
    properties:
      attributes:
        additionalProperties: true
        type: object
      id:
        type: string
      node_ids:
        items:
          type: string
        type: array
      relation:
        type: string
    type: object
  sharedmemory.QueryRequest:
    properties:
      additional_context:
        description: AdditionalContext provides optional contextual information to
          refine query execution. This may include prior conversation state, structured
          hints, or domain-specific metadata. The contents are treated as opaque by
          the API and interpreted by downstream components. Each element must be a
          structured object
        items:
          additionalProperties: true
          type: object
        type: array
      header:
        allOf:
        - $ref: '#/definitions/sharedmemory.Header'
        description: Header(s) of the request, required (must include agent_id)
      intent:
        description: User intent or natural-language query describing what information
          is being requested. This field is required and is the primary signal used
          to construct and execute the query
        type: string
      request_id:
        description: ID of the request, optional. If not provided, a random UUID is
          used to represent the request
        type: string
      search_strategy:
        description: 'Search strategy to be used when executing the query. Currently
          supported values: "semantic_graph_traversal". If not specified, defaults
          to "semantic_graph_traversal"'
        type: string
    type: object
  sharedmemory.QueryResponse:
    properties:
      message:
        description: Message provides detailed information from the query result
        type: string
      meta:
        allOf:
        - $ref: '#/definitions/common.TokenUsageMeta'
        description: Meta provides LLM token usage and performance metrics (optional,
          present when LLM calls are made)
      response_id:
        description: ID of the response, this gets populated from request_id
        type: string
    type: object
  sharedmemory.QueryResponseRecord:
    properties:
      concepts:
        items:
          $ref: '#/definitions/sharedmemory.QueryConcept'
        type: array
      relationships:
        items:
          $ref: '#/definitions/sharedmemory.QueryRelation'
        type: array
    type: object
  sharedmemory.VectorDeleteMetadataFilter:
    properties:
      chunk_index:
        type: integer
      data_source:
        type: string
      doc_index:
        type: integer
      extra_filters:
        additionalProperties:
          type: string
        type: object
      recorded_at_from:
        type: string
      recorded_at_to:
        type: string
    type: object
  sharedmemory.VectorEmbeddingPayload:
    properties:
      data:
        items:
          type: number
        type: array
    type: object
  sharedmemory.VectorSimilaritySearchPayload:
    properties:
      embedded_text:
        type: string
      embedding_vector:
        items:
          type: number
        type: array
      filters:
        $ref: '#/definitions/iocmemoryprovider.KnowledgeVectorMetadataFilter'
      search_metrics:
        type: string
      top_k:
        type: integer
    type: object
  sharedmemory.VectorSimilaritySearchRequest:
    properties:
      header:
        $ref: '#/definitions/sharedmemory.Header'
      payload:
        $ref: '#/definitions/sharedmemory.VectorSimilaritySearchPayload'
      request_id:
        type: string
    type: object
  sharedmemory.VectorSimilaritySearchResponse:
    properties:
      header:
        $ref: '#/definitions/sharedmemory.Header'
      request_id:
        type: string
      results:
        items:
          $ref: '#/definitions/sharedmemory.VectorSimilaritySearchResult'
        type: array
    type: object
  sharedmemory.VectorSimilaritySearchResult:
    properties:
      chunk_index:
        type: integer
      doc_index:
        type: integer
      domain:
        type: string
      embedded_text:
        type: string
      embedding_vector:
        items:
          type: number
        type: array
      score:
        type: number
      timestamp:
        type: string
    type: object
info:
  contact: {}
  description: IoC Cognition Fabric Node service — shared memory routing, memory operations
    proxy, and L9 message routing.
  title: CFN Service API
  version: "1.2"
paths:
  /api/cognition-engines:
    get:
      consumes:
      - application/json
      description: List cognition engines, optionally filtered by cfn_id and/or status.
      parameters:
      - description: Filter by CFN ID
        in: query
        name: cfn_id
        type: string
      - description: Filter by status (online/offline)
        in: query
        name: status
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: List of cognition engines
          schema:
            $ref: '#/definitions/cognitionengine.CognitionEngineList'
        "502":
          description: Failed to forward request to management plane
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: CFN not registered with management plane
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List Cognition Engines
      tags:
      - cognition-engine
    post:
      consumes:
      - application/json
      description: |-
        Receives a registration request from a Cognition Engine, adds CFN context (cfn_id),
        and forwards it to the management plane's /api/cognition-engines endpoint.

        **Request example**:
        ```json
        {
        "name": "Knowledge Management CE",
        "type": "knowledge_management",
        "url": "http://ce-host:9004",
        "capabilities": ["ingestion", "retrieval"],
        "metrics": ["kb.documents.indexed", "kb.search.latency_ms"]
        }
        ```

        The CFN service validates the request, injects the CFN ID association,
        and forwards the enriched payload to the management plane.
      parameters:
      - description: CE registration request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/cognitionengine.RegisterRequest'
      produces:
      - application/json
      responses:
        "200":
          description: CE registered successfully
          schema:
            $ref: '#/definitions/cognitionengine.RegisterResponse'
        "400":
          description: Invalid request body
          schema:
            additionalProperties:
              type: string
            type: object
        "502":
          description: Failed to forward request to management plane
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: CFN not registered with management plane
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Register a Cognition Engine with the management plane
      tags:
      - cognition-engine
  /api/cognition-engines/{ceId}:
    delete:
      consumes:
      - application/json
      description: Soft-delete (deregister) a cognition engine by ID.
      parameters:
      - description: Cognition Engine ID
        in: path
        name: ceId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: CE deleted successfully
        "400":
          description: Invalid CE ID format
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: CE not found
          schema:
            additionalProperties:
              type: string
            type: object
        "502":
          description: Failed to forward request to management plane
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: CFN not registered with management plane
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Delete Cognition Engine
      tags:
      - cognition-engine
    get:
      consumes:
      - application/json
      description: Get details of a specific cognition engine by ID.
      parameters:
      - description: Cognition Engine ID
        in: path
        name: ceId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: CE details
          schema:
            $ref: '#/definitions/cognitionengine.CognitionEngineDetail'
        "400":
          description: Invalid CE ID format
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: CE not found
          schema:
            additionalProperties:
              type: string
            type: object
        "502":
          description: Failed to forward request to management plane
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: CFN not registered with management plane
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get Cognition Engine
      tags:
      - cognition-engine
    patch:
      consumes:
      - application/json
      description: |-
        Update mutable fields of a CE: url, enabled, capabilities, metrics, config, mas_config, auth, kind, subkind.
        Immutable fields (cfn_id, version, name, auto_attach) cannot be updated and will return 400.
      parameters:
      - description: Cognition Engine ID
        in: path
        name: ceId
        required: true
        type: string
      - description: CE patch request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/cognitionengine.PatchRequest'
      produces:
      - application/json
      responses:
        "200":
          description: CE updated successfully
          schema:
            $ref: '#/definitions/cognitionengine.CognitionEngineDetail'
        "400":
          description: Invalid request or attempted to update immutable field
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: CE not found
          schema:
            additionalProperties:
              type: string
            type: object
        "502":
          description: Failed to forward request to management plane
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: CFN not registered with management plane
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Partially update a Cognition Engine
      tags:
      - cognition-engine
  /api/cognition-engines/{ceId}/heartbeat:
    put:
      consumes:
      - application/json
      description: |-
        Receives heartbeat requests from a Cognition Engine and forwards them to the management plane.
        The management plane updates the CE's last_seen timestamp and status (offline → online if applicable).

        CEs should call this endpoint every 30 seconds to maintain their online status.

        **Response example**:
        ```json
        {
        "status": "online",
        "last_seen": "2026-05-21T10:30:00Z"
        }
        ```
      parameters:
      - description: Cognition Engine ID
        in: path
        name: ceId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Heartbeat acknowledged
          schema:
            $ref: '#/definitions/cognitionengine.HeartbeatResponse'
        "404":
          description: CE not found
          schema:
            additionalProperties:
              type: string
            type: object
        "502":
          description: Failed to forward heartbeat to management plane
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: CFN not registered with management plane
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Proxy CE heartbeat to management plane
      tags:
      - cognition-engine
  /api/cognition-engines/{ceId}/metrics:
    get:
      description: |-
        Returns grouped time-series data filtered by time and entity dimensions.
        Returns both CE infrastructure metrics (queue, memory, CPU) and MAS operation metrics (tokens, latency, cost) processed by this CE.
        Response format groups datapoints by metric name to reduce verbosity (60-70% size reduction).
        No pagination - queries return all matching datapoints up to safety limit (100K max).
      parameters:
      - description: Cognition Engine UUID
        in: path
        name: ceId
        required: true
        type: string
      - description: Start time (Unix timestamp, RFC3339, or date)
        in: query
        name: start_time
        required: true
        type: string
      - description: End time (Unix timestamp, RFC3339, or date)
        in: query
        name: end_time
        required: true
        type: string
      - description: Filter MAS metrics by workspace UUID
        in: query
        name: workspace_id
        type: string
      - description: Filter MAS metrics by MAS UUID
        in: query
        name: mas_id
        type: string
      - description: Filter MAS metrics by agent ID
        in: query
        name: agent_id
        type: string
      - description: Filter by metric name (supports * wildcard)
        in: query
        name: metric_name
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/app.MetricsQueryResponse'
        "400":
          description: Invalid parameters
          schema:
            additionalProperties:
              type: string
            type: object
        "413":
          description: Too many datapoints (exceeds 100K limit)
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Query metrics within time range (CE and/or MAS)
      tags:
      - cognition-engine
    post:
      consumes:
      - application/json
      description: Accepts batch of CE infrastructure metrics (queue depth, memory,
        CPU, active requests) and stores in TimescaleDB asynchronously.
      parameters:
      - description: Cognition Engine ID
        in: path
        name: ceId
        required: true
        type: string
      - description: Metrics batch
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/app.IngestCEMetricsRequest'
      produces:
      - application/json
      responses:
        "202":
          description: Metrics accepted
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Validation error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Ingest CE infrastructure metrics
      tags:
      - cognition-engine
  /api/internal/cognition-engine/metrics:
    post:
      consumes:
      - application/json
      description: |-
        Accepts batch of metrics from CE and stores in TimescaleDB asynchronously.
        Auto-detects CE metrics (ce_id) vs MAS metrics (workspace_id/mas_id/agent_id).
      parameters:
      - description: Metrics batch
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/app.IngestMetricsRequest'
      produces:
      - application/json
      responses:
        "202":
          description: Metrics accepted
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Validation error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Ingest metrics batch (CE or MAS)
      tags:
      - internal
  /api/internal/l9/audit:
    get:
      description: Lists L9 protocol audit events with optional kind and episode_id
        filters
      parameters:
      - description: Filter by L9 kind (intent, exchange, contingency, commit, knowledge)
        in: query
        name: kind
        type: string
      - description: Filter by episode ID
        in: query
        name: episode_id
        type: string
      - default: 0
        description: Page number (0-based)
        in: query
        name: page
        type: integer
      - default: 20
        description: Page size
        in: query
        name: pageSize
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Paginated list of L9 audit events
          schema:
            $ref: '#/definitions/audit.L9AuditListResponse'
        "400":
          description: Invalid parameters
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List L9 audit events
      tags:
      - l9-audit
  /api/internal/l9/audit/{eventId}:
    get:
      description: Retrieves a single L9 protocol audit event by its UUID
      parameters:
      - description: Event UUID
        in: path
        name: eventId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: L9 audit event
          schema:
            $ref: '#/definitions/audit.L9AuditEvent'
        "400":
          description: Invalid event ID
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Event not found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get L9 audit event by ID
      tags:
      - l9-audit
  /api/internal/mgmt/workspaces/{workspaceId}/multi-agentic-systems/{masId}/knowledge-graph:
    get:
      description: Returns all nodes and edges in the knowledge graph for the given
        MAS.
      parameters:
      - description: Workspace ID
        in: path
        name: workspaceId
        required: true
        type: string
      - description: Multi-Agentic System ID
        in: path
        name: masId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Knowledge graph data
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Workspace or MAS not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Fetch knowledge graph for a MAS
      tags:
      - knowledge-graph
  /api/internal/mgmt/workspaces/{workspaceId}/multi-agentic-systems/{masId}/metrics:
    get:
      description: |-
        Returns time-series token usage and LLM operation metrics for a MAS across all attached CEs.
        Optionally filter by ce_id, agent_id, or metric_name.
        Response groups datapoints by (metric_name, ce_id, agent_id, attributes) to distinguish contributions from different CEs.
      parameters:
      - description: Workspace UUID
        in: path
        name: workspaceId
        required: true
        type: string
      - description: MAS UUID
        in: path
        name: masId
        required: true
        type: string
      - description: Start time (Unix timestamp, RFC3339, or date)
        in: query
        name: start_time
        required: true
        type: string
      - description: End time (Unix timestamp, RFC3339, or date)
        in: query
        name: end_time
        required: true
        type: string
      - description: Filter by Cognition Engine UUID
        in: query
        name: ce_id
        type: string
      - description: Filter by agent ID
        in: query
        name: agent_id
        type: string
      - description: Filter by metric name (supports * wildcard)
        in: query
        name: metric_name
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/app.MASMetricsQueryResponse'
        "400":
          description: Invalid parameters
          schema:
            additionalProperties:
              type: string
            type: object
        "413":
          description: Too many datapoints (exceeds 100K limit)
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Query token usage metrics for a MAS
      tags:
      - mas
  /api/internal/workspaces/{workspaceId}/multi-agentic-systems/{masId}/concepts/similarity-search:
    post:
      consumes:
      - application/json
      description: Finds concept nodes nearest to a query embedding vector using HNSW
        index.
      parameters:
      - description: Workspace ID
        in: path
        name: workspaceId
        required: true
        type: string
      - description: Multi-Agentic System ID
        in: path
        name: masId
        required: true
        type: string
      - description: Include raw embedding vectors in results (debug only)
        in: query
        name: include_embeddings
        type: boolean
      - description: Similarity search request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/app.conceptSimilaritySearchRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/app.conceptSimilaritySearchResponse'
        "400":
          description: Invalid request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Graph not found
          schema:
            additionalProperties:
              type: string
            type: object
