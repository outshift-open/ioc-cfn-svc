basePath: /
definitions:
  app.conceptSimilaritySearchHeader:
    properties:
      agent_id:
        type: string
    type: object
  app.conceptSimilaritySearchPayload:
    properties:
      embedded_text:
        type: string
      embedding_vector:
        items:
          type: number
        type: array
      search_metrics:
        type: string
      top_k:
        type: integer
    type: object
  app.conceptSimilaritySearchRequest:
    properties:
      header:
        $ref: '#/definitions/app.conceptSimilaritySearchHeader'
      payload:
        $ref: '#/definitions/app.conceptSimilaritySearchPayload'
      request_id:
        type: string
    type: object
  app.conceptSimilaritySearchResponse:
    properties:
      error:
        type: string
      header:
        $ref: '#/definitions/app.conceptSimilaritySearchResponseHeader'
      response_id:
        type: string
      results:
        items:
          $ref: '#/definitions/app.conceptSimilaritySearchResult'
        type: array
      status:
        type: string
    type: object
  app.conceptSimilaritySearchResponseHeader:
    properties:
      agent_id:
        type: string
      mas_id:
        type: string
      workspace_id:
        type: string
    type: object
  app.conceptSimilaritySearchResult:
    properties:
      concept_id:
        type: string
      concept_name:
        type: string
      embedding_vector:
        items:
          type: number
        type: array
      score:
        type: number
    type: object
  cognitionagentclient.ExtractionPayload:
    properties:
      data:
        description: |-
          Data contains the extraction payload and its structure depends on Metadata.Format.

          Supported formats: "observe-sdk-otel" and "openclaw

          1. format = "observe-sdk-otel"
             - Data MUST be a JSON array of ExtractionDataRecord objects.
             - Example:
          [
            { TraceId, SpanId, ParentSpanId, SpanName, ServiceName, SpanAttributes, Duration }
          ]

          2. format = "openclaw"
             - Data is an opaque JSON payload.
             - The structure is not interpreted or validated by this service and is processed as-is.

          Clients MUST ensure the Data field matches the structure required by the specified Metadata.Format.
        type: object
      metadata:
        allOf:
        - $ref: '#/definitions/cognitionagentclient.ExtractionPayloadMetadata'
        description: Metadata describes the format and interpretation of the payload.
    type: object
  cognitionagentclient.ExtractionPayloadMetadata:
    properties:
      format:
        description: |-
          Format specifies how the Data field should be interpreted.

          Supported values:
          - "observe-sdk-otel": Data is a JSON array of ExtractionDataRecord
          - "openclaw": Data is an opaque JSON payload
        type: string
    type: object
  semanticnegotiation.Agent:
    properties:
      id:
        description: ID is the unique agent identifier.
        type: string
      name:
        description: Name is the human-readable agent name.
        type: string
    type: object
  semanticnegotiation.AgentReply:
    properties:
      action:
        description: |-
          Action is the agent action.
          Allowed values: "accept", "reject", "counter_offer"
        type: string
      agent_id:
        description: AgentID is the agent identifier (must match one of the initiated
          agents).
        type: string
      offer:
        additionalProperties: true
        description: |-
          Offer is an optional structured offer payload.
          Required when Action is "counter_offer".
        type: object
    type: object
  semanticnegotiation.DecideRequest:
    properties:
      agent_replies:
        description: AgentReplies are the replies produced by agents since the last
          step.
        items:
          $ref: '#/definitions/semanticnegotiation.AgentReply'
        type: array
      session_id:
        description: SessionID is the session identifier previously provided to the
          start endpoint.
        type: string
    type: object
  semanticnegotiation.Response:
    properties:
      message:
        description: Message provides additional information about the negotiation
          state.
        type: string
      result:
        additionalProperties: true
        description: |-
          Result contains the pipeline execution result.
          The structure depends on the semantic negotiation library implementation.
        type: object
      status:
        description: Status indicates the result of the negotiation step.
        type: string
    type: object
  semanticnegotiation.StartRequest:
    properties:
      agents:
        description: Agents is the list of participating agents.
        items:
          $ref: '#/definitions/semanticnegotiation.Agent'
        type: array
      content_text:
        description: ContentText is the negotiation prompt/context used to initialize
          the session.
        type: string
      n_steps:
        description: |-
          NSteps is the maximum number of negotiation steps.
          If omitted, defaults to 20.
        type: integer
      session_id:
        description: |-
          SessionID is the client-provided session identifier.
          Currently assumed globally unique (not scoped by workspace/mas).
        type: string
    type: object
  sharedmemory.CreateOrUpdateRequest:
    properties:
      header:
        allOf:
        - $ref: '#/definitions/sharedmemory.Header'
        description: Header(s) of the request, optional
      payload:
        allOf:
        - $ref: '#/definitions/cognitionagentclient.ExtractionPayload'
        description: Payload contains the extraction metadata and the raw data to
          be processed. The structure of the payload data is defined by Payload.Metadata.Format
      request_id:
        description: ID of the request, optional. If not provided, a random UUID is
          used to represent the request
        type: string
    type: object
  sharedmemory.CreateOrUpdateResponse:
    properties:
      message:
        description: Optional message providing additional information
        type: string
      response_id:
        description: ID of the response, this gets populated from request_id
        type: string
      status:
        description: Status of the request
        type: string
    type: object
  sharedmemory.Header:
    properties:
      agent_id:
        description: ID that represents the agent, optional for query operations
        type: string
    type: object
  sharedmemory.QueryRequest:
    properties:
      additional_context:
        description: AdditionalContext provides optional contextual information to
          refine query execution. This may include prior conversation state, structured
          hints, or domain-specific metadata. The contents are treated as opaque by
          the API and interpreted by downstream components. Each element must be a
          structured object
        items:
          additionalProperties: true
          type: object
        type: array
      header:
        allOf:
        - $ref: '#/definitions/sharedmemory.Header'
        description: Header(s) of the request, required (must include agent_id)
      intent:
        description: User intent or natural-language query describing what information
          is being requested. This field is required and is the primary signal used
          to construct and execute the query
        type: string
      request_id:
        description: ID of the request, optional. If not provided, a random UUID is
          used to represent the request
        type: string
      search_strategy:
        description: 'Search strategy to be used when executing the query. Currently
          supported values: "semantic_graph_traversal". If not specified, defaults
          to "semantic_graph_traversal"'
        type: string
    type: object
  sharedmemory.QueryResponse:
    properties:
      message:
        description: Message provides detailed information from the query result
        type: string
      response_id:
        description: ID of the response, this gets populated from request_id
        type: string
    type: object
info:
  contact: {}
  description: IoC Cognition Fabric Node service — shared memory routing and memory
    operations proxy.
  title: CFN Service API
  version: "1.0"
paths:
  /api/internal/workspaces/{workspaceId}/multi-agentic-systems/{masId}/concepts/similarity-search:
    post:
      consumes:
      - application/json
      description: Finds concept nodes nearest to a query embedding vector using HNSW
        index.
      parameters:
      - description: Workspace ID
        in: path
        name: workspaceId
        required: true
        type: string
      - description: Multi-Agentic System ID
        in: path
        name: masId
        required: true
        type: string
      - description: Include raw embedding vectors in results (debug only)
        in: query
        name: include_embeddings
        type: boolean
      - description: Similarity search request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/app.conceptSimilaritySearchRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/app.conceptSimilaritySearchResponse'
        "400":
          description: Invalid request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Concept similarity search
      tags:
      - Graph Store
  /api/internal/workspaces/{workspaceId}/multi-agentic-systems/{masId}/graph/concepts/by_ids:
    post:
      consumes:
      - application/json
      description: Returns concept details for each of the provided concept IDs.
      parameters:
      - description: Workspace ID
        in: path
        name: workspaceId
        required: true
        type: string
      - description: Multi-Agentic System ID
        in: path
        name: masId
        required: true
        type: string
      - description: Concept IDs request
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
        "400":
          description: Invalid request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Fetch concepts by IDs
      tags:
      - Graph Store
  /api/internal/workspaces/{workspaceId}/multi-agentic-systems/{masId}/graph/neighbors/{conceptId}:
    get:
      description: Returns the neighboring concepts of a given concept in the knowledge
        graph.
      parameters:
      - description: Workspace ID
        in: path
        name: workspaceId
        required: true
        type: string
      - description: Multi-Agentic System ID
        in: path
        name: masId
        required: true
        type: string
      - description: Concept ID
        in: path
        name: conceptId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get neighbors by concept ID
      tags:
      - Graph Store
  /api/internal/workspaces/{workspaceId}/multi-agentic-systems/{masId}/graph/paths:
    post:
      consumes:
      - application/json
      description: Returns ordered paths through the knowledge graph between a source
        and target concept.
      parameters:
      - description: Workspace ID
        in: path
        name: workspaceId
        required: true
        type: string
      - description: Multi-Agentic System ID
        in: path
        name: masId
        required: true
        type: string
      - description: Graph paths request
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
        "400":
          description: Invalid request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Fetch paths between two concepts
      tags:
      - Graph Store
  /api/internal/workspaces/{workspaceId}/shared-memories/vector-store/{store_id}:
    delete:
      consumes:
      - application/json
      description: Deletes the shared memory vector store.
      parameters:
      - description: Workspace ID
        in: path
        name: workspaceId
        required: true
        type: string
      - description: Store ID
        in: path
        name: store_id
        required: true
        type: string
      - description: Delete vector store request
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: Vector Store successfully deleted
          schema:
            type: object
        "400":
          description: Invalid request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Deletes the shared memory vector store.
      tags:
      - shared-memories
  /api/workspaces/{workspaceId}/multi-agentic-systems/{masId}/agents/{agentId}/memory-operations:
    post:
      consumes:
      - application/json
      description: |-
        Forwards REST API requests to a remote memory provider (Mem0, Graphiti, etc.) for agent-specific memory operations.
        The memory provider base URL and auth credentials are auto-resolved from management plane config based on workspace/MAS/agent IDs.
        The `http-url` field should contain the relative path and query parameters to append to the provider base URL.

        **GET example** — retrieve memories:
        ```json
        {
        "header": {},
        "payload": {
        "http-request-type": "GET",
        "http-url": "v1/memories/?user_id=curl-test-user",
        "http-request-body": {},
        "http-headers": {}
        }
        }
        ```

        **POST example** — add memories:
        ```json
        {
        "header": {},
        "payload": {
        "http-request-type": "POST",
        "http-url": "/v1/memories/",
        "http-request-body": {
        "messages": [{"role": "user", "content": "I prefer dark mode in all my apps"}],
        "user_id": "curl-test-user"
        },
        "http-headers": {}
        }
        }
        ```
      parameters:
      - description: Workspace ID
        in: path
        name: workspaceId
        required: true
        type: string
      - description: Multi-Agentic System ID
        in: path
        name: masId
        required: true
        type: string
      - description: Agent ID
        in: path
        name: agentId
        required: true
        type: string
      - description: Memory operation request (see MemoryOperationRequest)
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: Proxied response (actual provider status is in http-status
            field)
          schema:
            type: object
        "400":
          description: Invalid request body or missing http-request-type
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Memory provider config not found for agent
          schema:
            additionalProperties:
              type: string
            type: object
        "502":
          description: Failed to forward request to memory provider
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: Memory proxy client not configured
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Proxy API requests to a remote memory provider
      tags:
      - memory-operations
  /api/workspaces/{workspaceId}/multi-agentic-systems/{masId}/semantic-negotiation/decide:
    post:
      consumes:
      - application/json
      description: Advances an existing semantic negotiation session with agent replies.
      parameters:
      - description: Workspace ID
        in: path
        name: workspaceId
        required: true
        type: string
      - description: Multi-Agentic System ID
        in: path
        name: masId
        required: true
        type: string
      - description: Semantic negotiation decide request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/semanticnegotiation.DecideRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Negotiation step executed successfully
          schema:
            $ref: '#/definitions/semanticnegotiation.Response'
        "400":
          description: Invalid request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Session not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Advance semantic negotiation session
      tags:
      - semantic-negotiation
  /api/workspaces/{workspaceId}/multi-agentic-systems/{masId}/semantic-negotiation/start:
    post:
      consumes:
      - application/json
      description: Initiates a new semantic negotiation session with multiple agents.
      parameters:
      - description: Workspace ID
        in: path
        name: workspaceId
        required: true
        type: string
      - description: Multi-Agentic System ID
        in: path
        name: masId
        required: true
        type: string
      - description: Semantic negotiation start request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/semanticnegotiation.StartRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Negotiation session started successfully
          schema:
            $ref: '#/definitions/semanticnegotiation.Response'
        "400":
          description: Invalid request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Start semantic negotiation session
      tags:
      - semantic-negotiation
  /api/workspaces/{workspaceId}/multi-agentic-systems/{masId}/shared-memories:
    post:
      consumes:
      - application/json
      description: Creates or updates shared memories with entries (concepts and relations)
        extracted from the provided trace or OpenClaw output for a given workspace
        and multi-agentic system.
      parameters:
      - description: Workspace ID
        in: path
        name: workspaceId
        required: true
        type: string
      - description: Multi-Agentic System ID
        in: path
        name: masId
        required: true
        type: string
      - description: Create or update shared memories request
        in: body
        name: body
        schema:
          $ref: '#/definitions/sharedmemory.CreateOrUpdateRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Shared memories successfully created or updated
          schema:
            $ref: '#/definitions/sharedmemory.CreateOrUpdateResponse'
        "400":
          description: Invalid request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create or update shared memories.
      tags:
      - shared-memories
  /api/workspaces/{workspaceId}/multi-agentic-systems/{masId}/shared-memories/query:
    post:
      consumes:
      - application/json
      description: Queries shared memories for a given workspace and multi-agentic
        system using a graph path query.
      parameters:
      - description: Workspace ID
        in: path
        name: workspaceId
        required: true
        type: string
      - description: Multi-Agentic System ID
        in: path
        name: masId
        required: true
        type: string
      - description: Query request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/sharedmemory.QueryRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Query executed successfully
          schema:
            $ref: '#/definitions/sharedmemory.QueryResponse'
        "400":
          description: Invalid request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Fetch shared memories
      tags:
      - shared-memories
  /api/workspaces/{workspaceId}/shared-memories/vector-store:
    post:
      consumes:
      - application/json
      description: Onboards the shared memory vector store.
      parameters:
      - description: Workspace ID
        in: path
        name: workspaceId
        required: true
        type: string
      - description: Onboard vector store request
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "201":
          description: Vector Store successfully onboarded
          schema:
            type: object
        "400":
          description: Invalid request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Onboards the shared memory vector store.
      tags:
      - shared-memories
swagger: "2.0"
