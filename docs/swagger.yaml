basePath: /
definitions:
  app.conceptSimilaritySearchHeader:
    properties:
      agent_id:
        type: string
    type: object
  app.conceptSimilaritySearchPayload:
    properties:
      embedded_text:
        type: string
      embedding_vector:
        items:
          type: number
        type: array
      search_metrics:
        type: string
      top_k:
        type: integer
    type: object
  app.conceptSimilaritySearchRequest:
    properties:
      header:
        $ref: '#/definitions/app.conceptSimilaritySearchHeader'
      payload:
        $ref: '#/definitions/app.conceptSimilaritySearchPayload'
      request_id:
        type: string
    type: object
  app.conceptSimilaritySearchResponse:
    properties:
      error:
        type: string
      header:
        $ref: '#/definitions/app.conceptSimilaritySearchResponseHeader'
      response_id:
        type: string
      results:
        items:
          $ref: '#/definitions/app.conceptSimilaritySearchResult'
        type: array
      status:
        type: string
    type: object
  app.conceptSimilaritySearchResponseHeader:
    properties:
      agent_id:
        type: string
      mas_id:
        type: string
      workspace_id:
        type: string
    type: object
  app.conceptSimilaritySearchResult:
    properties:
      concept_id:
        type: string
      concept_name:
        type: string
      embedding_vector:
        items:
          type: number
        type: array
      score:
        type: number
    type: object
info:
  contact: {}
  description: IoC Cognition Fabric Node service — shared memory routing and memory
    operations proxy.
  title: CFN Service API
  version: "1.0"
paths:
  /api/internal/workspaces/{workspaceId}/multi-agentic-systems/{masId}/concepts/similarity-search:
    post:
      consumes:
      - application/json
      description: Finds concept nodes nearest to a query embedding vector using HNSW
        index.
      parameters:
      - description: Workspace ID
        in: path
        name: workspaceId
        required: true
        type: string
      - description: Multi-Agentic System ID
        in: path
        name: masId
        required: true
        type: string
      - description: Include raw embedding vectors in results (debug only)
        in: query
        name: include_embeddings
        type: boolean
      - description: Similarity search request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/app.conceptSimilaritySearchRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/app.conceptSimilaritySearchResponse'
        "400":
          description: Invalid request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Concept similarity search
      tags:
      - Graph Store
  /api/internal/workspaces/{workspaceId}/multi-agentic-systems/{masId}/graph/concepts/by_ids:
    post:
      consumes:
      - application/json
      description: Returns concept details for each of the provided concept IDs.
      parameters:
      - description: Workspace ID
        in: path
        name: workspaceId
        required: true
        type: string
      - description: Multi-Agentic System ID
        in: path
        name: masId
        required: true
        type: string
      - description: Concept IDs request
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
        "400":
          description: Invalid request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Fetch concepts by IDs
      tags:
      - Graph Store
  /api/internal/workspaces/{workspaceId}/multi-agentic-systems/{masId}/graph/neighbors/{conceptId}:
    get:
      description: Returns the neighboring concepts of a given concept in the knowledge
        graph.
      parameters:
      - description: Workspace ID
        in: path
        name: workspaceId
        required: true
        type: string
      - description: Multi-Agentic System ID
        in: path
        name: masId
        required: true
        type: string
      - description: Concept ID
        in: path
        name: conceptId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get neighbors by concept ID
      tags:
      - Graph Store
  /api/internal/workspaces/{workspaceId}/multi-agentic-systems/{masId}/graph/paths:
    post:
      consumes:
      - application/json
      description: Returns ordered paths through the knowledge graph between a source
        and target concept.
      parameters:
      - description: Workspace ID
        in: path
        name: workspaceId
        required: true
        type: string
      - description: Multi-Agentic System ID
        in: path
        name: masId
        required: true
        type: string
      - description: Graph paths request
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
        "400":
          description: Invalid request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Fetch paths between two concepts
      tags:
      - Graph Store
  /api/workspaces/{workspaceId}/multi-agentic-systems/{masId}/agents/{agentId}/memory-operations:
    post:
      consumes:
      - application/json
      description: |-
        Forwards REST API requests to a remote memory provider (Mem0, Graphiti, etc.) for agent-specific memory operations.
        The memory provider base URL and auth credentials are auto-resolved from management plane config based on workspace/MAS/agent IDs.
        The `http-url` field should contain the relative path and query parameters to append to the provider base URL.

        **GET example** — retrieve memories:
        ```json
        {
        "header": {},
        "payload": {
        "http-request-type": "GET",
        "http-url": "v1/memories/?user_id=curl-test-user",
        "http-request-body": {},
        "http-headers": {}
        }
        }
        ```

        **POST example** — add memories:
        ```json
        {
        "header": {},
        "payload": {
        "http-request-type": "POST",
        "http-url": "/v1/memories/",
        "http-request-body": {
        "messages": [{"role": "user", "content": "I prefer dark mode in all my apps"}],
        "user_id": "curl-test-user"
        },
        "http-headers": {}
        }
        }
        ```
      parameters:
      - description: Workspace ID
        in: path
        name: workspaceId
        required: true
        type: string
      - description: Multi-Agentic System ID
        in: path
        name: masId
        required: true
        type: string
      - description: Agent ID
        in: path
        name: agentId
        required: true
        type: string
      - description: Memory operation request (see MemoryOperationRequest)
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: Proxied response (actual provider status is in http-status
            field)
          schema:
            type: object
        "400":
          description: Invalid request body or missing http-request-type
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Memory provider config not found for agent
          schema:
            additionalProperties:
              type: string
            type: object
        "502":
          description: Failed to forward request to memory provider
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: Memory proxy client not configured
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Proxy API requests to a remote memory provider
      tags:
      - memory-operations
  /api/workspaces/{workspaceId}/multi-agentic-systems/{masId}/semantic-negotiation/decide:
    post:
      consumes:
      - application/json
      description: Advances an existing semantic negotiation session with agent replies.
      parameters:
      - description: Workspace ID
        in: path
        name: workspaceId
        required: true
        type: string
      - description: Multi-Agentic System ID
        in: path
        name: masId
        required: true
        type: string
      - description: Semantic negotiation decide request
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: Negotiation step executed successfully
          schema:
            type: object
        "400":
          description: Invalid request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Session not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Advance semantic negotiation session
      tags:
      - semantic-negotiation
  /api/workspaces/{workspaceId}/multi-agentic-systems/{masId}/semantic-negotiation/start:
    post:
      consumes:
      - application/json
      description: Initiates a new semantic negotiation session with multiple agents.
      parameters:
      - description: Workspace ID
        in: path
        name: workspaceId
        required: true
        type: string
      - description: Multi-Agentic System ID
        in: path
        name: masId
        required: true
        type: string
      - description: Semantic negotiation start request
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: Negotiation session started successfully
          schema:
            type: object
        "400":
          description: Invalid request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Start semantic negotiation session
      tags:
      - semantic-negotiation
  /api/workspaces/{workspaceId}/multi-agentic-systems/{masId}/shared-memories:
    post:
      consumes:
      - application/json
      description: Creates or updates shared memories with entries (concepts and relations)
        extracted from the provided trace or OpenClaw output for a given workspace
        and multi-agentic system.
      parameters:
      - description: Workspace ID
        in: path
        name: workspaceId
        required: true
        type: string
      - description: Multi-Agentic System ID
        in: path
        name: masId
        required: true
        type: string
      - description: Create or update shared memories request
        in: body
        name: body
        schema:
          type: object
      produces:
      - application/json
      responses:
        "201":
          description: Shared memories successfully created or updated
          schema:
            type: object
        "400":
          description: Invalid request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create or update shared memories.
      tags:
      - shared-memories
  /api/workspaces/{workspaceId}/multi-agentic-systems/{masId}/shared-memories/query:
    post:
      consumes:
      - application/json
      description: Queries shared memories for a given workspace and multi-agentic
        system using a graph path query.
      parameters:
      - description: Workspace ID
        in: path
        name: workspaceId
        required: true
        type: string
      - description: Multi-Agentic System ID
        in: path
        name: masId
        required: true
        type: string
      - description: Query request
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: Query executed successfully
          schema:
            type: object
        "400":
          description: Invalid request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Fetch shared memories
      tags:
      - shared-memories
swagger: "2.0"
