      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/cognitiveagents.MemorySearchResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/cognitiveagents.MemorySearchResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/cognitiveagents.MemorySearchResponse'
      summary: Search cognitive agent memory
      tags:
      - cognitive-agents
  /api/internal/audit-events:
    get:
      description: Returns audit events with optional resource_type and audit_type
        query filters
      parameters:
      - description: Filter by resource type
        in: query
        name: resource_type
        type: string
      - description: Filter by audit type
        in: query
        name: audit_type
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/audit.Audit'
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List audit events
      tags:
      - audit
    post:
      consumes:
      - application/json
      description: Creates a new audit event after validating required fields and
        enum values
      parameters:
      - description: Audit event request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/audit.CreateAuditEventRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create an audit event
      tags:
      - audit
  /api/internal/audit-events/{eventId}:
    delete:
      description: Deletes a single audit event by its UUID (internal API only)
      parameters:
      - description: Audit event UUID
        in: path
        name: eventId
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Delete an audit event
      tags:
      - audit
    get:
      description: Returns a single audit event by its UUID
      parameters:
      - description: Audit event UUID
        in: path
        name: eventId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/audit.Audit'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get an audit event by ID
      tags:
      - audit
  /api/v1/cfn/dummy:
    get:
      description: Returns mock CFN data
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema: {}
      summary: Get CFN dummy data
      tags:
      - cfn
  /api/workspaces/{workspaceId}/multi-agentic-systems/{masId}/agents/{agentId}/memory-operations:
    post:
      consumes:
      - application/json
      description: Proxies HTTP requests to a remote memory provider for agent memory
        operations
      parameters:
      - description: Workspace ID
        in: path
        name: workspaceId
        required: true
        type: string
      - description: Multi-Agentic System ID
        in: path
        name: masId
        required: true
        type: string
      - description: Agent ID
        in: path
        name: agentId
        required: true
        type: string
      - description: Memory operation request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/memoryoperations.MemoryOperationRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/memoryoperations.MemoryOperationResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Execute memory operations on remote memory provider
      tags:
      - memory-operations
  /api/workspaces/{workspaceId}/multi-agentic-systems/{systemId}/shared-memories:
    post:
      consumes:
      - application/json
      description: Upserts shared memory entries for a given workspace and multi-agentic
        system
      parameters:
      - description: Workspace ID
        in: path
        name: workspaceId
        required: true
        type: string
      - description: Multi-Agentic System ID
        in: path
        name: systemId
        required: true
        type: string
      - description: Upsert request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/sharedmemory.SharedMemoryUpsertRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/sharedmemory.SharedMemoryUpsertResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Upsert shared memories
      tags:
      - shared-memories
  /api/workspaces/{workspaceId}/multi-agentic-systems/{systemId}/shared-memories/query:
    post:
      consumes:
      - application/json
      description: Fetches shared memory entries for a given workspace and multi-agentic
        system
      parameters:
      - description: Workspace ID
        in: path
        name: workspaceId
        required: true
        type: string
      - description: Multi-Agentic System ID
        in: path
        name: systemId
        required: true
        type: string
      - description: Query request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/sharedmemory.SharedMemoryQueryRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/sharedmemory.SharedMemoryQueryResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Fetch shared memories
      tags:
      - shared-memories
