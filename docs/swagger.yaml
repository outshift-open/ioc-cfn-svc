info:
  contact: {}
  title: Template API
  version: "1.0"
paths:
  /api/cfn/{cfnId}/memory:
    post:
      consumes:
      - application/json
      description: Creates a new memory record for a cognitive agent
      parameters:
      - description: CFN ID
        in: path
        name: cfnId
        required: true
        type: string
      - description: Memory create request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/cognitiveagents.MemoryCreateRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/cognitiveagents.MemoryCreateResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/cognitiveagents.MemoryCreateResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/cognitiveagents.MemoryCreateResponse'
      summary: Create cognitive agent memory
      tags:
      - cognitive-agents
  /api/cfn/{cfnId}/memory/concepts/search:
    post:
      consumes:
      - application/json
      description: Searches memory concepts for a cognitive agent
      parameters:
      - description: CFN ID
        in: path
        name: cfnId
        required: true
        type: string
      - description: Concepts search request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/cognitiveagents.ConceptsSearchRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/cognitiveagents.ConceptsSearchResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/cognitiveagents.ConceptsSearchResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/cognitiveagents.ConceptsSearchResponse'
      summary: Search cognitive agent memory concepts
      tags:
      - cognitive-agents
  /api/cfn/{cfnId}/memory/paths/search:
    post:
      consumes:
      - application/json
      description: Searches for paths between two nodes in cognitive agent memory
      parameters:
      - description: CFN ID
        in: path
        name: cfnId
        required: true
        type: string
      - description: Paths search request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/cognitiveagents.PathsSearchRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/cognitiveagents.PathsSearchResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/cognitiveagents.PathsSearchResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/cognitiveagents.PathsSearchResponse'
      summary: Search memory paths
      tags:
      - cognitive-agents
  /api/cfn/{cfnId}/memory/search:
    post:
      consumes:
      - application/json
      description: Searches cognitive agent memory with natural-language queries and
        embeddings
      parameters:
      - description: CFN ID
        in: path
        name: cfnId
        required: true
        type: string
      - description: Memory search request
        in: body
        name: body
        required: true
        schema:
