basePath: /
definitions:
  app.Filters:
    properties:
      agent_id:
        type: string
      mas_id:
        type: string
      metric_name:
        type: string
      workspace_id:
        type: string
    type: object
  app.IngestMetricsRequest:
    properties:
      agent_id:
        type: string
      attributes:
        additionalProperties: true
        type: object
      mas_id:
        type: string
      metrics:
        items:
          $ref: '#/definitions/app.MetricDataPoint'
        type: array
      workspace_id:
        type: string
    type: object
  app.MetricDataPoint:
    properties:
      attributes:
        additionalProperties: true
        type: object
      name:
        type: string
      timestamp:
        type: string
      value:
        type: number
    type: object
  app.MetricRecord:
    properties:
      agent_id:
        type: string
      attributes:
        additionalProperties: true
        type: object
      mas_id:
        type: string
      metric_name:
        type: string
      timestamp:
        type: string
      value:
        type: number
      workspace_id:
        type: string
    type: object
  app.MetricsQueryResponse:
    properties:
      filters:
        $ref: '#/definitions/app.Filters'
      metrics:
        items:
          $ref: '#/definitions/app.MetricRecord'
        type: array
      pagination:
        $ref: '#/definitions/app.Pagination'
      period:
        $ref: '#/definitions/app.Period'
    type: object
  app.Pagination:
    properties:
      limit:
        type: integer
      offset:
        type: integer
      total:
        type: integer
    type: object
  app.Period:
    properties:
      end:
        type: string
      start:
        type: string
    type: object
  app.conceptSimilaritySearchHeader:
    properties:
      agent_id:
        type: string
    type: object
  app.conceptSimilaritySearchPayload:
    properties:
      embedded_text:
        type: string
      embedding_vector:
        items:
          type: number
        type: array
      search_metrics:
        type: string
      top_k:
        type: integer
    type: object
  app.conceptSimilaritySearchRequest:
    properties:
      header:
        $ref: '#/definitions/app.conceptSimilaritySearchHeader'
      payload:
        $ref: '#/definitions/app.conceptSimilaritySearchPayload'
      request_id:
        type: string
    type: object
  app.conceptSimilaritySearchResponse:
    properties:
      error:
        type: string
      header:
        $ref: '#/definitions/app.conceptSimilaritySearchResponseHeader'
      response_id:
        type: string
      results:
        items:
          $ref: '#/definitions/app.conceptSimilaritySearchResult'
        type: array
      status:
        type: string
    type: object
  app.conceptSimilaritySearchResponseHeader:
    properties:
      agent_id:
        type: string
      mas_id:
        type: string
      workspace_id:
        type: string
    type: object
  app.conceptSimilaritySearchResult:
    properties:
      concept_id:
        type: string
      concept_name:
        type: string
      embedding_vector:
        items:
          type: number
        type: array
      score:
        type: number
    type: object
  app.updateGraphConcept:
    properties:
      attributes:
        additionalProperties: true
        type: object
      description:
        type: string
      id:
        type: string
      internal_attributes:
        items:
          $ref: '#/definitions/iocmemoryprovider.InternalAttributes'
        type: array
      name:
        type: string
    type: object
  app.updateGraphHeader:
    properties:
      cfn_id:
        type: string
    type: object
  app.updateGraphRelation:
    properties:
      attributes:
        additionalProperties: true
        type: object
      id:
        type: string
      internal_attributes:
        items:
          $ref: '#/definitions/iocmemoryprovider.InternalAttributes'
        type: array
      node_ids:
        items:
          type: string
        type: array
      relationship:
        type: string
    type: object
  app.updateGraphRequest:
    properties:
      concepts:
        items:
          $ref: '#/definitions/app.updateGraphConcept'
        type: array
      descriptor:
        type: string
      header:
        $ref: '#/definitions/app.updateGraphHeader'
      metadata:
        additionalProperties: true
        type: object
      relations:
        items:
          $ref: '#/definitions/app.updateGraphRelation'
        type: array
      request_id:
        type: string
    type: object
  app.updateGraphResponse:
    properties:
      concepts_updated:
        type: integer
      descriptor:
        type: string
      error:
        type: string
      header:
        $ref: '#/definitions/app.updateGraphHeader'
      metadata:
        additionalProperties: true
        type: object
      relations_updated:
        type: integer
      response_id:
        type: string
      updated_at:
        type: integer
    type: object
  cognitionagentclient.ExtractionPayload:
    properties:
      data:
        description: |-
          Data contains the extraction payload and its structure depends on Metadata.Format.

          Supported formats: "observe-sdk-otel" and "openclaw

          1. format = "observe-sdk-otel"
             - Data MUST be a JSON array of ExtractionDataRecord objects.
             - Example:
          [
            { TraceId, SpanId, ParentSpanId, SpanName, ServiceName, SpanAttributes, Duration }
          ]

          2. format = "openclaw"
             - Data is an opaque JSON payload.
             - The structure is not interpreted or validated by this service and is processed as-is.

          Clients MUST ensure the Data field matches the structure required by the specified Metadata.Format.
        type: object
      metadata:
        allOf:
        - $ref: '#/definitions/cognitionagentclient.ExtractionPayloadMetadata'
        description: Metadata describes the format and interpretation of the payload.
    type: object
  cognitionagentclient.ExtractionPayloadMetadata:
    properties:
      format:
        description: |-
          Format specifies how the Data field should be interpreted.

          Supported values:
          - "observe-sdk-otel": Data is a JSON array of ExtractionDataRecord
          - "openclaw": Data is an opaque JSON payload
        type: string
    type: object
  cognitionagents.RequestType:
    enum:
    - KNOWLEDGE_VECTORS_UPSERT
    - KNOWLEDGE_VECTORS_QUERY
    type: string
    x-enum-varnames:
    - ReqTypeKnowledgeVectorsUpsert
    - ReqTypeKnowledgeVectorsQuery
  cognitionagents.SharedMemoryVectorsRequest:
    properties:
      header:
        $ref: '#/definitions/common.Header'
      request_body:
        items:
          type: integer
        type: array
      request_type:
        $ref: '#/definitions/cognitionagents.RequestType'
    type: object
  cognitionagents.SharedMemoryVectorsResponse:
    properties:
      error:
        $ref: '#/definitions/common.ErrorDetail'
      header:
        $ref: '#/definitions/common.Header'
      results:
        items:
          type: integer
        type: array
    type: object
  common.ErrorDetail:
    properties:
      detail:
        additionalProperties: true
        type: object
      message:
        type: string
    type: object
  common.Header:
    properties:
      agent_id:
        description: Optional
        type: string
      mas_id:
        description: Mandatory
        type: string
      workspace_id:
        description: Mandatory
        type: string
    type: object
  iocmemoryprovider.InternalAttributes:
    properties:
      attributes:
        additionalProperties: true
        type: object
      owner:
        type: string
    type: object
  iocmemoryprovider.KnowledgeVectorMetadataFilter:
    properties:
      chunk_index:
        type: integer
      data_source:
        type: string
      doc_index:
        type: integer
      recorded_at_from:
        type: string
      recorded_at_to:
        type: string
    type: object
  memoryoperations.MemoryOperationHeader:
    type: object
  memoryoperations.MemoryOperationPayload:
    properties:
      http-headers:
        additionalProperties:
          type: string
        description: Custom headers
        type: object
      http-request-body:
        additionalProperties: true
        description: JSON payload
        type: object
      http-request-type:
        description: POST, PUT, GET, DELETE, etc.
        type: string
      http-url:
        description: URL with query parameters (URL encoded)
        type: string
    type: object
  memoryoperations.MemoryOperationRequest:
    properties:
      header:
        $ref: '#/definitions/memoryoperations.MemoryOperationHeader'
      payload:
        $ref: '#/definitions/memoryoperations.MemoryOperationPayload'
    type: object
  memoryoperations.MemoryOperationResponse:
    properties:
      http-headers:
        additionalProperties:
          type: string
        type: object
      http-response-body:
        additionalProperties: true
        type: object
      http-status:
        type: integer
    type: object
  semanticnegotiation.Agent:
    properties:
      id:
        description: ID is the unique agent identifier.
        type: string
      name:
        description: Name is the human-readable agent name.
        type: string
    type: object
  semanticnegotiation.AgentDecision:
    properties:
      action:
        description: Action is one of "accept", "reject", or "counter_offer".
        type: string
      offer:
        additionalProperties:
          type: string
        description: |-
          Offer is the proposed option per issue when Action is "counter_offer".
          Shape: {issue_id: option_label}
        type: object
      participant_id:
        description: ParticipantID is the ID of the participant who made this decision.
        type: string
    type: object
  semanticnegotiation.AgentReply:
    properties:
      action:
        description: Action is one of "accept", "reject", or "counter_offer".
        type: string
      offer:
        additionalProperties:
          type: string
        description: |-
          Offer is the proposed option per issue when Action is "counter_offer".
          Shape: {issue_id: option_label}
        type: object
      participant_id:
        description: ParticipantID is the ID of the agent replying.
        type: string
    type: object
  semanticnegotiation.DecideRequest:
    properties:
      agent_replies:
        description: AgentReplies contains each agent's reply to the current round.
        items:
          $ref: '#/definitions/semanticnegotiation.AgentReply'
        type: array
      session_id:
        description: SessionID is the session identifier from the /start response.
        type: string
    type: object
  semanticnegotiation.DecideResponse:
    properties:
      final_result:
        additionalProperties: true
        description: |-
          FinalResult holds the terminal negotiation envelope when Status is
          "agreed", "broken", or "timeout".
        type: object
      messages:
        description: |-
          Messages contains the next round's messages to dispatch to agents.
          Present only when Status is "ongoing". Forward these to each agent's
          callback endpoint, collect their replies, and submit via /decide again.
        items:
          items:
            type: integer
          type: array
        type: array
      round:
        description: Round is the round number that was just evaluated.
        type: integer
      session_id:
        description: SessionID echoes the session identifier.
        type: string
      shared_memory:
        allOf:
        - $ref: '#/definitions/semanticnegotiation.SharedMemoryResult'
        description: |-
          SharedMemory reports the outcome of persisting the agreement to shared
          memory. Only present when Status is "agreed".
      status:
        description: Status is "ongoing", "agreed", "broken", or "timeout".
        type: string
    type: object
  semanticnegotiation.NegotiationOutcome:
    properties:
      chosen_option:
        type: string
      issue_id:
        type: string
    type: object
  semanticnegotiation.NegotiationTrace:
    properties:
      broken:
        description: Broken indicates whether a participant explicitly broke off.
        type: boolean
      final_agreement:
        description: FinalAgreement is the agreed option per issue, if any.
        items:
          $ref: '#/definitions/semanticnegotiation.NegotiationOutcome'
        type: array
      rounds:
        description: Rounds contains all SAO rounds in order (1-based).
        items:
          $ref: '#/definitions/semanticnegotiation.RoundOffer'
        type: array
      timedout:
        description: Timedout indicates whether the SAO exhausted its step budget.
        type: boolean
    type: object
  semanticnegotiation.RoundOffer:
    properties:
      decisions:
        description: Decisions contains each participant's response to this round's
          offer.
        items:
          $ref: '#/definitions/semanticnegotiation.AgentDecision'
        type: array
      next_proposer_id:
        description: |-
          NextProposerID is the ID of the participant who will propose in the next round.
          Omitted on the final round.
        type: string
      offer:
        additionalProperties:
          type: string
        description: 'Offer is the proposed option per issue. Shape: {issue_id: option_label}'
        type: object
      proposer_id:
        description: ProposerID is the ID of the participant who made this proposal.
        type: string
      round:
        description: Round is the 1-based round number.
        type: integer
    type: object
  semanticnegotiation.SharedMemoryResult:
    properties:
      error:
        description: Error contains a human-readable reason when Persisted is false.
        type: string
      persisted:
        description: Persisted is true when the agreement was successfully written
          to shared memory.
        type: boolean
    type: object
  semanticnegotiation.StartRequest:
    properties:
      agents:
        description: Agents is the list of participating agents (minimum 2).
        items:
          $ref: '#/definitions/semanticnegotiation.Agent'
        type: array
      content_text:
        description: ContentText is the negotiation prompt/context used to initialize
          the session.
        type: string
      n_steps:
        description: |-
          NSteps is the maximum number of SAO rounds.
          If omitted, the service computes a budget from negotiation complexity.
        type: integer
      session_id:
        description: SessionID is the client-provided session identifier.
        type: string
    type: object
  semanticnegotiation.StartResponse:
    properties:
      current_round:
        allOf:
        - $ref: '#/definitions/semanticnegotiation.RoundOffer'
        description: CurrentRound is the first offer in the trace (SSTP envelope path
          only).
      issues:
        description: Issues is the list of negotiable issues discovered from content_text.
        items:
          type: string
        type: array
      messages:
        description: |-
          Messages contains the first round's messages to dispatch to agents.
          Forward each message to the corresponding agent's callback endpoint,
          collect their replies, and submit via /decide.
        items:
          items:
            type: integer
          type: array
        type: array
      n_steps:
        description: NSteps is the SAO round budget for this session.
        type: integer
      options_per_issue:
        additionalProperties:
          items:
            type: string
          type: array
        description: OptionsPerIssue lists the candidate options for each issue.
        type: object
      round:
        description: Round is the current round number (1-based).
        type: integer
      session_id:
        description: SessionID echoes the session identifier.
        type: string
      status:
        description: Status is "initiated", "ongoing", "agreed", "broken", or "timeout".
        type: string
      total_rounds:
        description: TotalRounds is the total SAO rounds in the pre-computed trace
          (SSTP envelope path only).
        type: integer
      trace:
        allOf:
        - $ref: '#/definitions/semanticnegotiation.NegotiationTrace'
        description: Trace is the complete pre-computed SAO trace (SSTP envelope path
          only).
    type: object
  sharedmemory.AgentVectorDeleteRequest:
    properties:
      filters:
        $ref: '#/definitions/sharedmemory.VectorDeleteMetadataFilter'
      id:
        type: string
      request_id:
        type: string
    type: object
  sharedmemory.AgentVectorUpsertRecord:
    properties:
      content:
        type: string
      embedding:
        $ref: '#/definitions/sharedmemory.VectorEmbeddingPayload'
      id:
        type: string
      metadata:
        additionalProperties: true
        type: object
    type: object
  sharedmemory.AgentVectorUpsertRequest:
    properties:
      records:
        items:
          $ref: '#/definitions/sharedmemory.AgentVectorUpsertRecord'
        type: array
      request_id:
        type: string
    type: object
  sharedmemory.ConceptsByIdsRequest:
    properties:
      ids:
        items:
          type: string
        type: array
    type: object
  sharedmemory.ConceptsByIdsResponse:
    properties:
      concepts:
        items:
          $ref: '#/definitions/sharedmemory.GraphConcept'
        type: array
    type: object
  sharedmemory.CreateOrUpdateRequest:
    properties:
      header:
        allOf:
        - $ref: '#/definitions/sharedmemory.Header'
        description: Header(s) of the request, optional
      payload:
        allOf:
        - $ref: '#/definitions/cognitionagentclient.ExtractionPayload'
        description: Payload contains the extraction metadata and the raw data to
          be processed. The structure of the payload data is defined by Payload.Metadata.Format
      request_id:
        description: ID of the request, optional. If not provided, a random UUID is
          used to represent the request
        type: string
    type: object
  sharedmemory.CreateOrUpdateResponse:
    properties:
      graph_store_message:
        description: Optional message from the graph store upsert operation
        type: string
      response_id:
        description: ID of the response, this gets populated from request_id
        type: string
      status:
        description: Status of the request
        type: string
      vector_store_message:
        description: Optional message from the vector store upsert operation
        type: string
    type: object
  sharedmemory.GraphConcept:
    properties:
      description:
        type: string
      id:
        type: string
      name:
        type: string
      type:
        type: string
    type: object
  sharedmemory.GraphPathsRequest:
    properties:
      limit:
        type: integer
      max_depth:
        type: integer
      relations:
        items:
          type: string
        type: array
      source_id:
        type: string
      target_id:
        type: string
    type: object
  sharedmemory.GraphPathsResponse:
    properties:
      paths:
        items:
          $ref: '#/definitions/sharedmemory.Path'
        type: array
      status:
        type: string
    type: object
  sharedmemory.Header:
    properties:
      agent_id:
        description: ID that represents the agent, optional for query operations
        type: string
    type: object
  sharedmemory.NeighborsResponse:
    properties:
      records:
        items:
          $ref: '#/definitions/sharedmemory.QueryResponseRecord'
        type: array
    type: object
  sharedmemory.Path:
    properties:
      edges:
        items:
          $ref: '#/definitions/sharedmemory.PathEdge'
        type: array
      node_ids:
        items:
          type: string
        type: array
      path_length:
        type: integer
      symbolic:
        type: string
    type: object
  sharedmemory.PathEdge:
    properties:
      from_id:
        type: string
      from_name:
        type: string
      relation:
        type: string
      to_id:
        type: string
      to_name:
        type: string
    type: object
  sharedmemory.QueryConcept:
    properties:
      attributes:
        additionalProperties: true
        type: object
      description:
        type: string
      id:
        type: string
      name:
        type: string
      tags:
        items:
          type: string
        type: array
    type: object
  sharedmemory.QueryRelation:
    properties:
      attributes:
        additionalProperties: true
        type: object
      id:
        type: string
      node_ids:
        items:
          type: string
        type: array
      relation:
        type: string
    type: object
  sharedmemory.QueryRequest:
    properties:
      additional_context:
        description: AdditionalContext provides optional contextual information to
          refine query execution. This may include prior conversation state, structured
          hints, or domain-specific metadata. The contents are treated as opaque by
          the API and interpreted by downstream components. Each element must be a
          structured object
        items:
          additionalProperties: true
          type: object
        type: array
      header:
        allOf:
        - $ref: '#/definitions/sharedmemory.Header'
        description: Header(s) of the request, required (must include agent_id)
      intent:
        description: User intent or natural-language query describing what information
          is being requested. This field is required and is the primary signal used
          to construct and execute the query
        type: string
      request_id:
        description: ID of the request, optional. If not provided, a random UUID is
          used to represent the request
        type: string
      search_strategy:
        description: 'Search strategy to be used when executing the query. Currently
          supported values: "semantic_graph_traversal". If not specified, defaults
          to "semantic_graph_traversal"'
        type: string
    type: object
  sharedmemory.QueryResponse:
    properties:
      message:
        description: Message provides detailed information from the query result
        type: string
      response_id:
        description: ID of the response, this gets populated from request_id
        type: string
    type: object
  sharedmemory.QueryResponseRecord:
    properties:
      concepts:
        items:
          $ref: '#/definitions/sharedmemory.QueryConcept'
        type: array
      relationships:
        items:
          $ref: '#/definitions/sharedmemory.QueryRelation'
        type: array
    type: object
  sharedmemory.VectorDeleteMetadataFilter:
    properties:
      chunk_index:
        type: integer
      data_source:
        type: string
      doc_index:
        type: integer
      extra_filters:
        additionalProperties:
          type: string
        type: object
      recorded_at_from:
        type: string
      recorded_at_to:
        type: string
    type: object
  sharedmemory.VectorEmbeddingPayload:
    properties:
      data:
        items:
          type: number
        type: array
    type: object
  sharedmemory.VectorSimilaritySearchPayload:
    properties:
      embedded_text:
        type: string
      embedding_vector:
        items:
          type: number
        type: array
      filters:
        $ref: '#/definitions/iocmemoryprovider.KnowledgeVectorMetadataFilter'
      search_metrics:
        type: string
      top_k:
        type: integer
    type: object
  sharedmemory.VectorSimilaritySearchRequest:
    properties:
      header:
        $ref: '#/definitions/sharedmemory.Header'
      payload:
        $ref: '#/definitions/sharedmemory.VectorSimilaritySearchPayload'
      request_id:
        type: string
    type: object
  sharedmemory.VectorSimilaritySearchResponse:
    properties:
      header:
        $ref: '#/definitions/sharedmemory.Header'
      request_id:
        type: string
      results:
        items:
          $ref: '#/definitions/sharedmemory.VectorSimilaritySearchResult'
        type: array
    type: object
  sharedmemory.VectorSimilaritySearchResult:
    properties:
      chunk_index:
        type: integer
      doc_index:
        type: integer
      domain:
        type: string
      embedded_text:
        type: string
      embedding_vector:
        items:
          type: number
        type: array
      score:
        type: number
      timestamp:
        type: string
    type: object
info:
  contact: {}
  description: IoC Cognition Fabric Node service — shared memory routing and memory
    operations proxy.
  title: CFN Service API
  version: "1.0"
paths:
  /api/cognition-engine/metrics:
    get:
      description: Returns raw metric data points filtered by time and optional dimensions
      parameters:
      - description: Start time (Unix timestamp '1716076800', RFC3339 '2026-05-19T00:00:00Z',
          or date '2026-05-19')
        in: query
        name: start_time
        required: true
        type: string
      - description: End time (Unix timestamp '1716163200', RFC3339 '2026-05-20T00:00:00Z',
          or date '2026-05-20')
        in: query
        name: end_time
        required: true
        type: string
      - description: Filter by workspace UUID
        in: query
        name: workspace_id
        type: string
      - description: Filter by MAS UUID
        in: query
        name: mas_id
        type: string
      - description: Filter by agent ID
        in: query
        name: agent_id
        type: string
      - description: Filter by metric name (supports * wildcard)
        in: query
        name: metric_name
        type: string
      - description: Max results (default 1000, max 10000)
        in: query
        name: limit
        type: integer
      - description: Pagination offset (default 0)
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/app.MetricsQueryResponse'
        "400":
          description: Invalid parameters
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Query metrics within time range
      tags:
      - cognition-engine
  /api/internal/cognition-engine/metrics:
    post:
      consumes:
      - application/json
      description: Accepts batch of metrics from CE and stores in TimescaleDB asynchronously
      parameters:
      - description: Metrics batch
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/app.IngestMetricsRequest'
      produces:
      - application/json
      responses:
        "202":
          description: Metrics accepted
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Validation error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Ingest metrics batch from Cognition Engine
      tags:
      - internal
  /api/internal/mgmt/workspaces/{workspaceId}/multi-agentic-systems/{masId}/knowledge-graph:
    get:
      description: Returns all nodes and edges in the knowledge graph for the given
        MAS.
      parameters:
      - description: Workspace ID
        in: path
        name: workspaceId
        required: true
        type: string
      - description: Multi-Agentic System ID
        in: path
        name: masId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
