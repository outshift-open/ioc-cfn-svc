basePath: /
definitions:
  audit.Audit:
    properties:
      audit_extra_information:
        type: string
      audit_information:
        items:
          type: integer
        type: array
      audit_resource_identifier:
        type: string
      audit_type:
        type: string
      created_by:
        type: string
      created_on:
        type: string
      id:
        type: string
      last_modified_by:
        type: string
      last_modified_on:
        type: string
      operation_id:
        type: string
      resource_identifier:
        type: string
      resource_type:
        type: string
    type: object
  audit.CreateAuditEventRequest:
    properties:
      audit_extra_information:
        type: string
      audit_information:
        items:
          type: integer
        type: array
      audit_resource_identifier:
        type: string
      audit_type:
        type: string
      created_by:
        type: string
      last_modified_by:
        type: string
      operation_id:
        type: string
      resource_identifier:
        type: string
      resource_type:
        type: string
    type: object
  iocmemoryprovider.Concept:
    properties:
      attributes:
        additionalProperties: true
        type: object
      description:
        type: string
      embeddings:
        $ref: '#/definitions/iocmemoryprovider.EmbeddingConfig'
      id:
        type: string
      name:
        type: string
      tags:
        items:
          type: string
        type: array
    type: object
  iocmemoryprovider.EmbeddingConfig:
    properties:
      data:
        items:
          type: number
        type: array
      name:
        type: string
    type: object
  iocmemoryprovider.KnowledgeGraphStoreRequest:
    properties:
      force_replace:
        type: boolean
      mas_id:
        type: string
      memory_type:
        type: string
      records:
        $ref: '#/definitions/iocmemoryprovider.Records'
      request_id:
        type: string
      wksp_id:
        type: string
    type: object
  iocmemoryprovider.KnowledgeGraphStoreResponse:
    properties:
      message:
        type: string
      request_id:
        type: string
      status:
        $ref: '#/definitions/iocmemoryprovider.ResponseStatus'
    type: object
  iocmemoryprovider.Records:
    properties:
      concepts:
        items:
          $ref: '#/definitions/iocmemoryprovider.Concept'
        type: array
      relations:
        items:
          $ref: '#/definitions/iocmemoryprovider.Relation'
        type: array
    type: object
  iocmemoryprovider.Relation:
    properties:
      attributes:
        additionalProperties: true
        type: object
      embeddings:
        $ref: '#/definitions/iocmemoryprovider.EmbeddingConfig'
      id:
        type: string
      node_ids:
        items:
          type: string
        type: array
      relation:
        type: string
    type: object
  iocmemoryprovider.ResponseStatus:
    enum:
    - success
    - failure
    - validation error
    - not found
    type: string
    x-enum-varnames:
    - ResponseStatusSuccess
    - ResponseStatusFailure
    - ResponseStatusValidationError
    - ResponseStatusNotFound
  memoryoperations.MemoryOperationHeader:
    type: object
  memoryoperations.MemoryOperationPayload:
    properties:
      http-headers:
        additionalProperties:
          type: string
        description: Custom headers
        type: object
      http-request-body:
        additionalProperties: true
        description: JSON payload
        type: object
      http-request-type:
        description: POST, PUT, GET, DELETE, etc.
        type: string
      http-url:
        description: URL with query parameters (URL encoded)
        type: string
    type: object
  memoryoperations.MemoryOperationRequest:
    properties:
      header:
        $ref: '#/definitions/memoryoperations.MemoryOperationHeader'
      payload:
        $ref: '#/definitions/memoryoperations.MemoryOperationPayload'
    type: object
  memoryoperations.MemoryOperationResponse:
    properties:
      http-headers:
        additionalProperties:
          type: string
        type: object
      http-response-body:
        additionalProperties: true
        type: object
      http-status:
        type: integer
    type: object
info:
  contact: {}
  title: Template API
  version: "1.0"
paths:
  /api/internal/audit-events:
    get:
      description: Returns audit events with optional resource_type and audit_type
        query filters
      parameters:
      - description: Filter by resource type
        in: query
        name: resource_type
        type: string
      - description: Filter by audit type
        in: query
        name: audit_type
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/audit.Audit'
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List audit events
      tags:
      - audit
    post:
      consumes:
      - application/json
      description: Creates a new audit event after validating required fields and
        enum values
      parameters:
      - description: Audit event request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/audit.CreateAuditEventRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create an audit event
      tags:
      - audit
  /api/internal/audit-events/{eventId}:
    delete:
      description: Deletes a single audit event by its UUID (internal API only)
      parameters:
      - description: Audit event UUID
        in: path
        name: eventId
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Delete an audit event
      tags:
      - audit
    get:
      description: Returns a single audit event by its UUID
      parameters:
      - description: Audit event UUID
        in: path
        name: eventId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/audit.Audit'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get an audit event by ID
      tags:
      - audit
  /api/v1/cfn/dummy:
    get:
      description: Returns mock CFN data
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema: {}
      summary: Get CFN dummy data
      tags:
      - cfn
  /api/workspaces/{workspaceId}/multi-agentic-systems/{masId}/agents/{agentId}/memory-operations:
    post:
      consumes:
      - application/json
      description: Proxies HTTP requests to a remote memory provider for agent memory
        operations
      parameters:
      - description: Workspace ID
        in: path
        name: workspaceId
        required: true
        type: string
      - description: Multi-Agentic System ID
        in: path
        name: masId
        required: true
        type: string
      - description: Agent ID
        in: path
        name: agentId
        required: true
        type: string
      - description: Memory operation request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/memoryoperations.MemoryOperationRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/memoryoperations.MemoryOperationResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Execute memory operations on remote memory provider
      tags:
      - memory-operations
  /api/workspaces/{workspaceId}/multi-agentic-systems/{masId}/shared-memories:
    post:
      consumes:
      - application/json
      description: Upserts shared memory entries (concepts and relations) for a given
        workspace and multi-agentic system.
      parameters:
      - description: Workspace ID
        in: path
        name: workspaceId
        required: true
        type: string
      - description: Multi-Agentic System ID
        in: path
        name: masId
        required: true
        type: string
      - description: Upsert request
        in: body
        name: body
        schema:
          $ref: '#/definitions/iocmemoryprovider.KnowledgeGraphStoreRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Shared memories successfully upserted
          schema:
            $ref: '#/definitions/iocmemoryprovider.KnowledgeGraphStoreResponse'
        "400":
          description: Invalid request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Upsert shared memories.
      tags:
      - shared-memories
  /api/workspaces/{workspaceId}/multi-agentic-systems/{masId}/shared-memories/query:
    post:
      consumes:
      - application/json
      description: Queries shared memories for a given workspace and multi-agentic
        system using a graph path query.
      parameters:
      - description: Workspace ID
        in: path
        name: workspaceId
        required: true
        type: string
      - description: Multi-Agentic System ID
        in: path
        name: masId
        required: true
        type: string
      - description: Upsert request
        in: body
        name: body
        schema:
          $ref: '#/definitions/iocmemoryprovider.KnowledgeGraphStoreRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Query executed successfully
          schema:
            $ref: '#/definitions/iocmemoryprovider.KnowledgeGraphStoreResponse'
        "400":
          description: Invalid request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Fetch shared memories
      tags:
      - shared-memories
swagger: "2.0"
