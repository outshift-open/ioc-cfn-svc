name: Build and Push Docker Image

on:
  push:
    branches: [main]
    tags: ["*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Pre-cleanup Docker images
        run: docker system prune -af || true

      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Get Git tag (if any)
        id: get_tag
        run: |
          echo "tag_name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Generate metadata
        id: metadata
        run: |
          echo "date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"
          echo "date_formatted=$(date -u +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"
          echo "short_sha=${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"
          echo "git_commit_time=$(git log -1 --format=%cI)" >> "$GITHUB_OUTPUT"
          echo "git_branch=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Log Event Type
        run: |
          echo "Event: ${{ github.event_name }} | Ref: ${{ github.ref }} | SHA: ${{ steps.metadata.outputs.short_sha }}"

      - name: Log in to GitHub Container Registry
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image (PR)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          file: build/Dockerfile
          push: false
          platforms: linux/amd64
          tags: |
            ghcr.io/cisco-eti/ioc-cfn-svc:pr-${{ github.event.pull_request.number }}
            ghcr.io/cisco-eti/ioc-cfn-svc:${{ steps.metadata.outputs.date_formatted }}-${{ steps.metadata.outputs.short_sha }}
          build-args: |
            GIT_COMMIT_SHA=${{ steps.metadata.outputs.short_sha }}
            GIT_COMMIT_TIME=${{ steps.metadata.outputs.git_commit_time }}
            GIT_BRANCH=${{ steps.metadata.outputs.git_branch }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Build and push Docker image (main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          file: build/Dockerfile
          push: true
          platforms: linux/amd64, linux/arm64
          tags: |
            ghcr.io/${{ github.repository }}/ioc-cfn-svc:latest
            ghcr.io/${{ github.repository }}/ioc-cfn-svc:${{ steps.metadata.outputs.date_formatted }}-${{ steps.metadata.outputs.short_sha }}
          build-args: |
            GIT_COMMIT_SHA=${{ steps.metadata.outputs.short_sha }}
            GIT_COMMIT_TIME=${{ steps.metadata.outputs.git_commit_time }}
            GIT_BRANCH=${{ steps.metadata.outputs.git_branch }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Build and push Docker image (tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          file: build/Dockerfile
          push: true
          platforms: linux/amd64, linux/arm64
          tags: |
            ghcr.io/cisco-eti/ioc-cfn-svc:${{ steps.get_tag.outputs.tag_name }}
            ghcr.io/cisco-eti/ioc-cfn-svc:${{ steps.metadata.outputs.date_formatted }}-${{ steps.metadata.outputs.short_sha }}
          build-args: |
            GIT_COMMIT_SHA=${{ steps.metadata.outputs.short_sha }}
            GIT_COMMIT_TIME=${{ steps.metadata.outputs.git_commit_time }}
            GIT_BRANCH=${{ steps.metadata.outputs.git_branch }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
