name: Unit Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  checkout-unit-tests:
    name: Checkout & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.ref }}
          clean: true

      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod

      - name: Install swag
        run: go install github.com/swaggo/swag/cmd/swag@latest

      - name: Generate OpenAPI spec
        run: |
          swag init --parseDependency --parseInternal --dir .
          python3 scripts/split_swagger.py
          # Add copyright header to generated docs/docs.go
          if ! grep -q "Copyright" docs/docs.go; then
            cat > docs/docs.go.tmp << 'EOF'
          // Copyright 2026 Cisco Systems, Inc. and its affiliates
          //
          // SPDX-License-Identifier: Apache-2.0


          EOF
            cat docs/docs.go >> docs/docs.go.tmp
            mv docs/docs.go.tmp docs/docs.go
          fi

      - name: Check OpenAPI spec is up-to-date
        run: |
          if ! git diff --exit-code docs/swagger.yaml docs/swagger.json docs/swagger-internal.json docs/docs.go; then
            echo "❌ ERROR: OpenAPI spec is out of sync with code!"
            echo ""
            echo "The swagger documentation needs to be regenerated."
            echo "Please run the following command locally and commit the changes:"
            echo ""
            echo "  make docs"
            echo ""
            git diff docs/swagger.yaml docs/swagger.json docs/swagger-internal.json docs/docs.go
            exit 1
          fi
          echo "✅ OpenAPI spec is up-to-date"

      - name: Unit Tests
        run: bash build/unit-test.sh
