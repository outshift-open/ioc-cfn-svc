services:
  ioc-cfn-svc:
    image: ghcr.io/cisco-eti/ioc-cfn-svc:latest
    build:
      context: ..
      dockerfile: build/Dockerfile
      args:
        GIT_COMMIT_SHA: ${GIT_COMMIT_SHA:-unknown}
        GIT_COMMIT_TIME: ${GIT_COMMIT_TIME:-unknown}
        GIT_BRANCH: ${GIT_BRANCH:-unknown}
    container_name: ioc-cfn-svc
    restart: unless-stopped
    ports:
      - "9010:9010"
    env_file:
      - ../.env
    environment:
      PORT: "9010"
      APP_NAME: "ioc-cfn-svc"
      CFN_NAME: ${CFN_NAME:-cfn-new}
      HEARTBEAT_INTERVAL_SECONDS: ${HEARTBEAT_INTERVAL_SECONDS:-10}
      MCP_ENABLED: ${MCP_ENABLED:-false}
      MCP_PORT: ${MCP_PORT:-9010}
      DB_HOST: ${DB_HOST:-cfn-svc-db}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-cfn_cp}
      DB_USER: ${DB_USER:-postgresUser}
      DB_PASSWORD: ${DB_PASSWORD:-postgresPW}
    depends_on:
      cfn-svc-db:
        condition: service_healthy

  cfn-svc-db:
    image: postgres:17-alpine
    container_name: cfn-svc-db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-cfn_cp}
      POSTGRES_USER: ${DB_USER:-postgresUser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgresPW}
    volumes:
      - cfn-svc-postgres-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgresUser} -d ${DB_NAME:-cfn_cp}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  cfn-svc-postgres-volume:

networks:
  default:
    name: ioc-cfn-svc
